  <script>
    // SESSION GUARD — jalankan sebelum DOM dimuat
    (function() {
      try {
        var raw = localStorage.getItem('hm_session');
        if (!raw) { window.location.replace('login-cuanmabar.html'); return; }
        var s = JSON.parse(raw);
        if (!s || !s.loginAt) { window.location.replace('login-cuanmabar.html'); return; }
        if (s.expiresAt && Date.now() > s.expiresAt) {
          localStorage.removeItem('hm_session');
          localStorage.removeItem('hm_komunitas');
          window.location.replace('login-cuanmabar.html'); return;
        }
      } catch(e) { window.location.replace('login-cuanmabar.html'); }
    })();
  </script>

  <script>
    // --- 1. CONFIG DATA AWAL BERSIH (EMPTY STATE READY FOR USER) ---
    const defaultKas = [];
    const defaultMembers = [];
    const defaultInv = [];

    // ── SUPABASE CLIENT ────────────────────────────────────────────────────
    const SUPA_URL = 'https://pxfpskzwkfpxslsvqbpz.supabase.co';
    const SUPA_KEY = 'sb_publishable_F0VfuDGusu23CJY8PIqMIg_AgyITitp';
    const db = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: false
      }
    });

    // ── DATA STATE ──────────────────────────────────────────────────────────
    // localStorage key HARUS per-user agar data tidak tercampur antar komunitas
    // Key diset setelah _userId diketahui di loadCloudData()
    let transactions = [];  // init kosong — akan diisi dari Supabase
    let members      = [];
    let inventoryTxs = [];
    let _userId      = null;
    let _isSyncing   = false;
    let _lsKey       = { kas: 'cm_kas', mem: 'cm_members', inv: 'cm_inv' }; // default, override per user

    let activeTab = 'dashboard';
    let editingId = null;

    // ── SYNC STATUS UI ───────────────────────────────────────────────────────
    function showSyncStatus(msg, color) {
      const el = document.getElementById('sync-status');
      if (!el) return;
      el.textContent = msg;
      el.style.color = color || '#64748b';
      if (color === '#22c55e') setTimeout(() => { el.style.opacity = '0.5'; }, 2500);
      else el.style.opacity = '1';
    }

    // ── LOAD DATA DARI SUPABASE + CEK LANGGANAN ────────────────────────────
    async function loadCloudData() {
      try {
        showSyncStatus('⏳ Memuat...', '#f59e0b');

        // Coba ambil session dari Supabase Auth
        let { data: { session } } = await db.auth.getSession();

        // Fallback: jika session null, coba refresh token
        if (!session) {
          const { data: refreshed } = await db.auth.refreshSession();
          session = refreshed?.session || null;
        }

        if (!session) {
          showSyncStatus('⚠️ Sesi habis — login ulang', '#ef4444');
          setTimeout(() => {
            localStorage.removeItem('hm_session');
            localStorage.removeItem('hm_komunitas');
            window.location.href = 'login-cuanmabar.html';
          }, 2000);
          return;
        }
        _userId = session.user.id;

        // ── Set localStorage key per-user (namespace isolation) ───────────
        // Setiap komunitas punya key sendiri → tidak bisa tercampur
        _lsKey = {
          kas: 'cm_kas_'  + _userId,
          mem: 'cm_mem_'  + _userId,
          inv: 'cm_inv_'  + _userId
        };

        // ── 1. Cek status langganan dari profiles ──────────────────────────
        const { data: prof } = await db
          .from('profiles')
          .select('username_komunitas, paket_langganan, tanggal_aktif, tanggal_kedaluarsa')
          .eq('id', _userId)
          .single();

        if (prof) {
          renderSubscriptionBadge(prof);
          // Cek expired — data TETAP ADA, hanya akses diblokir
          if (prof.tanggal_kedaluarsa) {
            const exp = new Date(prof.tanggal_kedaluarsa);
            exp.setHours(23, 59, 59, 999);
            if (Date.now() > exp.getTime()) {
              showSyncStatus('⛔ Akses berakhir', '#ef4444');
              showExpiredBanner(prof);
              updateUI(); return; // stop di sini, data tidak di-load ke UI
            }
          }
        }

        // ── 2. Load data keuangan ──────────────────────────────────────────
        const { data, error } = await db
          .from('cuanmabar_data')
          .select('data_type, payload')
          .eq('user_id', _userId);

        if (error) throw error;

        if (data && data.length > 0) {
          // Data ada di cloud — pakai data cloud, simpan ke localStorage user ini
          data.forEach(row => {
            if (row.data_type === 'kas') {
              transactions = row.payload;
              localStorage.setItem(_lsKey.kas, JSON.stringify(transactions));
            }
            if (row.data_type === 'members') {
              members = row.payload;
              localStorage.setItem(_lsKey.mem, JSON.stringify(members));
            }
            if (row.data_type === 'inv') {
              inventoryTxs = row.payload;
              localStorage.setItem(_lsKey.inv, JSON.stringify(inventoryTxs));
            }
          });
          showSyncStatus('✅ Data dimuat', '#22c55e');
        } else {
          // Akun baru — coba load dari localStorage user ini (offline cache)
          const lsKas = localStorage.getItem(_lsKey.kas);
          const lsMem = localStorage.getItem(_lsKey.mem);
          const lsInv = localStorage.getItem(_lsKey.inv);
          if (lsKas) transactions  = JSON.parse(lsKas);
          if (lsMem) members       = JSON.parse(lsMem);
          if (lsInv) inventoryTxs  = JSON.parse(lsInv);
          showSyncStatus('✅ Data siap', '#22c55e');
          // Inisialisasi baris di Supabase (payload kosong) agar upsert berikutnya bekerja
          await saveCloud();
        }
        updateUI();
      } catch(e) {
        console.error('loadCloudData:', e.message);
        // Offline — load dari localStorage user ini jika ada
        if (_lsKey.kas !== 'cm_kas') { // userId sudah diketahui
          const lsKas = localStorage.getItem(_lsKey.kas);
          const lsMem = localStorage.getItem(_lsKey.mem);
          const lsInv = localStorage.getItem(_lsKey.inv);
          if (lsKas) transactions  = JSON.parse(lsKas);
          if (lsMem) members       = JSON.parse(lsMem);
          if (lsInv) inventoryTxs  = JSON.parse(lsInv);
        }
        showSyncStatus('📶 Offline — data lokal', '#f59e0b');
        updateUI();
      }
    }

    // ── BADGE LANGGANAN DI HEADER ────────────────────────────────────────────
    function renderSubscriptionBadge(prof) {
      const el = document.getElementById('subs-badge');
      if (!el || !prof) return;
      const paket = (prof.paket_langganan || '').toUpperCase();
      const exp   = prof.tanggal_kedaluarsa
        ? new Date(prof.tanggal_kedaluarsa).toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric'})
        : '—';
      const aktif = prof.tanggal_aktif
        ? new Date(prof.tanggal_aktif).toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric'})
        : '—';
      const isExpired = prof.tanggal_kedaluarsa && Date.now() > new Date(prof.tanggal_kedaluarsa).getTime();
      el.innerHTML = `
        <span style="font-size:11px;font-weight:700;font-family:'Poppins',sans-serif;
                     padding:3px 10px;border-radius:20px;
                     background:${isExpired ? 'rgba(239,68,68,.2)' : 'rgba(247,148,29,.2)'};
                     border:1.5px solid ${isExpired ? '#ef4444' : '#F7941D'};
                     color:${isExpired ? '#ef4444' : '#FFB347'};">
          ${isExpired ? '⛔' : '⚡'} ${paket || 'BASIC'}
        </span>
        <span style="font-size:10px;color:#64748b;margin-left:6px;">
          Aktif: ${aktif} · Hingga: ${exp}
        </span>`;
    }

    // ── BANNER EXPIRED (akses diblokir, data aman) ───────────────────────────
    function showExpiredBanner(prof) {
      // Sembunyikan konten utama
      const appContent = document.getElementById('app-content');
      if (appContent) appContent.style.display = 'none';
      const nav = document.querySelector('nav');
      if (nav) nav.style.display = 'none';

      // Tampilkan banner
      let banner = document.getElementById('expired-banner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'expired-banner';
        document.body.appendChild(banner);
      }
      const exp = prof.tanggal_kedaluarsa
        ? new Date(prof.tanggal_kedaluarsa).toLocaleDateString('id-ID', {day:'2-digit',month:'long',year:'numeric'})
        : '—';
      banner.innerHTML = `
        <div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px;">
          <div style="background:#1e1e28;border:2px solid rgba(239,68,68,.4);border-radius:24px;
                      padding:36px 28px;max-width:400px;width:100%;text-align:center;">
            <div style="font-size:52px;margin-bottom:12px;">⛔</div>
            <div style="font-family:'Poppins',sans-serif;font-size:20px;font-weight:900;
                        color:#f0f0f8;margin-bottom:8px;">Akses Berakhir</div>
            <div style="font-size:13px;color:#94a3b8;margin-bottom:6px;line-height:1.6;">
              Langganan <strong style="color:#FFB347;">${(prof.paket_langganan||'BASIC').toUpperCase()}</strong>
              kamu berakhir pada <strong style="color:#f87171;">${exp}</strong>.
            </div>
            <div style="font-size:12px;color:#64748b;margin-bottom:24px;line-height:1.6;">
              📦 Data keuangan kamu <strong style="color:#22c55e;">tetap tersimpan</strong> dan aman.<br>
              Perpanjang akses untuk melanjutkan pencatatan.
            </div>
            <a href="https://wa.me/6281234567890?text=Halo+HOSTMABAR%2C+saya+ingin+perpanjang+CUANMABAR"
               target="_blank"
               style="display:block;padding:13px 24px;background:linear-gradient(135deg,#F7941D,#E8174A);
                      color:#fff;border-radius:12px;font-family:'Poppins',sans-serif;font-size:14px;
                      font-weight:800;text-decoration:none;margin-bottom:12px;
                      box-shadow:0 4px 16px rgba(247,148,29,.4);">
              💬 Perpanjang via WhatsApp
            </a>
            <button onclick="handleLogout()"
                    style="background:none;border:none;color:#64748b;font-size:12px;
                           cursor:pointer;font-family:'Poppins',sans-serif;">
              Logout
            </button>
          </div>
        </div>`;
    }

    // ── SIMPAN KE SUPABASE (upsert) ──────────────────────────────────────────
    async function saveCloud() {
      if (!_userId || _isSyncing) return;
      _isSyncing = true;
      showSyncStatus('💾 Menyimpan...', '#f59e0b');
      try {
        const now = new Date().toISOString();
        const rows = [
          { user_id: _userId, data_type: 'kas',     payload: transactions,  updated_at: now },
          { user_id: _userId, data_type: 'members', payload: members,       updated_at: now },
          { user_id: _userId, data_type: 'inv',     payload: inventoryTxs, updated_at: now },
        ];
        const { error } = await db
          .from('cuanmabar_data')
          .upsert(rows, { onConflict: 'user_id,data_type' });
        if (error) throw error;
        showSyncStatus('✅ Tersimpan online', '#22c55e');
      } catch(e) {
        console.error('saveCloud error:', e.message, e);
        showSyncStatus('⚠️ Gagal sync — ' + (e.message || 'cek koneksi'), '#ef4444');
      } finally {
        _isSyncing = false;
      }
    }

    // --- 2. HELPERS ---
    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    const saveLocal = () => {
      // Simpan ke localStorage user-specific (tidak bisa tercampur antar user)
      localStorage.setItem(_lsKey.kas, JSON.stringify(transactions));
      localStorage.setItem(_lsKey.mem, JSON.stringify(members));
      localStorage.setItem(_lsKey.inv, JSON.stringify(inventoryTxs));
      // Sync ke Supabase
      saveCloud();
    };

    const updateUI = () => {
      renderActiveTab();
      renderPrintView();
      updateNavStyles();
      lucide.createIcons();
    };

    function switchTab(tab) {
      activeTab = tab;
      updateUI();
    }

    function updateNavStyles() {
      ['dashboard', 'kas', 'iuran', 'inventory'].forEach(t => {
        const btn = document.getElementById(`nav-${t}`);
        if(t === activeTab) {
          btn.classList.add('text-orange-500'); btn.classList.remove('text-slate-500');
        } else {
          btn.classList.remove('text-orange-500'); btn.classList.add('text-slate-500');
        }
      });
    }

    function handleLogout() {
      const m = document.getElementById('logoutModal');
      m.classList.remove('hidden');
      m.classList.add('flex');
    }
    function tutupLogoutModal() {
      const m = document.getElementById('logoutModal');
      m.classList.add('hidden');
      m.classList.remove('flex');
    }
    function konfirmasiLogout() {
      tutupLogoutModal();
      localStorage.removeItem('hm_session');
      localStorage.removeItem('hm_komunitas');
      try {
        const { createClient } = window.supabase;
        const dbAuth = createClient(
          'https://pxfpskzwkfpxslsvqbpz.supabase.co',
          'sb_publishable_F0VfuDGusu23CJY8PIqMIg_AgyITitp'
        );
        dbAuth.auth.signOut().finally(() => {
          window.location.href = '';
        });
      } catch(e) {
        window.location.href = '';
      }
    }

    // --- 3. RENDER CORE TAB UI ---
    function renderDashboard() {
      let tIn = 0, tOut = 0;
      transactions.forEach(t => t.type === 'in' ? tIn += t.amount : tOut += t.amount);
      let balance = tIn - tOut;
      let total = tIn + tOut;
      let inPercent = total === 0 ? 0 : Math.round((tIn / total) * 100);
      
      let unpaid = members.filter(m => m.status === 'belum' || m.status === 'nunggak');
      let recentTx = transactions.slice(0, 3);

      let html = `
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-6 shadow-xl border border-slate-700 mb-6">
          <h3 class="text-slate-400 text-sm font-medium mb-1">Total Saldo Kas</h3>
          <h1 class="text-4xl font-bold mb-6 ${balance >= 0 ? 'text-white' : 'text-red-400'}">${formatRp(balance)}</h1>
          
          <div class="flex items-center space-x-6 border-t border-slate-700 pt-5">
            <div class="relative w-16 h-16 flex-shrink-0 rounded-full" style="background: conic-gradient(${total === 0 ? '#475569 0% 100%' : `#10b981 0% ${inPercent}%, #ef4444 ${inPercent}% 100%`})">
              <div class="absolute inset-1.5 bg-slate-800 rounded-full"></div>
            </div>
            <div class="flex-1 space-y-2">
              <div class="flex justify-between items-center text-sm">
                <div class="flex items-center text-emerald-400"><i data-lucide="arrow-up-right" class="w-4 h-4 mr-1"></i> Masuk</div>
                <div class="text-white font-semibold">${formatRp(tIn)}</div>
              </div>
              <div class="flex justify-between items-center text-sm">
                <div class="flex items-center text-red-400"><i data-lucide="arrow-down-right" class="w-4 h-4 mr-1"></i> Keluar</div>
                <div class="text-white font-semibold">${formatRp(tOut)}</div>
              </div>
            </div>
          </div>
        </div>
      `;

      if(unpaid.length > 0) {
        html += `
          <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex items-start space-x-3 mb-6">
            <i data-lucide="alert-circle" class="text-red-400 mt-0.5 flex-shrink-0 w-5 h-5"></i>
            <div>
              <h4 class="text-red-400 font-medium text-sm">Perhatian: Ada Iuran Tertunggak</h4>
              <p class="text-slate-300 text-xs mt-1">${unpaid.length} member belum bayar iuran periode ini.</p>
              <button onclick="switchTab('iuran')" class="text-red-400 text-xs font-bold mt-2 underline">Cek Detail Member</button>
            </div>
          </div>
        `;
      }

      saveLocal(); closeModal(); updateUI();

    // ── HISTORI PER BULAN ────────────────────────────────────────────────────
    function openHistoriModal() {
      // Kumpulkan semua bulan unik dari data transaksi
      const monthMap = {};
      transactions.forEach(tx => {
        if (!tx.date) return;
        const [y, m] = tx.date.split('-');
        const key = `${y}-${m}`;
        if (!monthMap[key]) monthMap[key] = { year: y, month: m, txs: [] };
        monthMap[key].txs.push(tx);
      });

      // Urutkan bulan dari terbaru
      const months = Object.values(monthMap).sort((a, b) =>
        `${b.year}-${b.month}`.localeCompare(`${a.year}-${a.month}`)
      );

      const BULAN = ['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
      const BULAN_FULL = ['','Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

      if (months.length === 0) {
        document.getElementById('modal-container').innerHTML = `
          <div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
            <div class="bg-slate-800 w-full max-w-sm rounded-2xl p-6 border border-slate-700 shadow-2xl modal-enter text-center">
              <div class="text-4xl mb-3">📅</div>
              <p class="text-white font-bold mb-1">Belum Ada Histori</p>
              <p class="text-slate-400 text-sm mb-4">Catat transaksi pertama untuk mulai melihat histori.</p>
              <button onclick="closeModal()" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg text-sm font-semibold">Tutup</button>
            </div>
          </div>`;
        if (window.lucide) lucide.createIcons();
        return;
      }

      // Grid kalender bulan
      const gridItems = months.map(m => {
        const totalIn  = m.txs.filter(t => t.type === 'in').reduce((s,t) => s + t.amount, 0);
        const totalOut = m.txs.filter(t => t.type === 'out').reduce((s,t) => s + t.amount, 0);
        const net = totalIn - totalOut;
        return `
          <button onclick="openHistoriDetail('${m.year}','${m.month}')"
            class="bg-slate-700/60 hover:bg-slate-600/80 border border-slate-600/50 hover:border-orange-500/50
                   rounded-xl p-3 text-left transition-all">
            <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">${m.year}</span>
              <span class="text-xs text-slate-500">${m.txs.length} txn</span>
            </div>
            <div class="text-white font-bold text-lg leading-tight">${BULAN_FULL[parseInt(m.month)]}</div>
            <div class="mt-2 text-xs ${net >= 0 ? 'text-emerald-400' : 'text-red-400'} font-semibold">
              ${net >= 0 ? '+' : ''}${formatRp(net)}
            </div>
          </button>`;
      }).join('');

      document.getElementById('modal-container').innerHTML = `
        <div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
          <div class="bg-slate-800 w-full max-w-sm rounded-2xl border border-slate-700 shadow-2xl modal-enter overflow-hidden">
            <div class="flex justify-between items-center px-5 py-4 border-b border-slate-700">
              <div>
                <h3 class="text-white font-bold text-base">📅 Histori Kas</h3>
                <p class="text-slate-400 text-xs mt-0.5">Pilih bulan untuk melihat transaksi</p>
              </div>
              <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl leading-none">✕</button>
            </div>
            <div class="p-4 overflow-y-auto max-h-[70vh]">
              <div class="grid grid-cols-2 gap-2.5">
                ${gridItems}
              </div>
            </div>
          </div>
        </div>`;
      if (window.lucide) lucide.createIcons();
    }

    function openHistoriDetail(year, month) {
      const BULAN_FULL = ['','Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
      const label = `${BULAN_FULL[parseInt(month)]} ${year}`;
      const monthKey = `${year}-${month}`;

      const txs = transactions
        .filter(tx => tx.date && tx.date.startsWith(monthKey))
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      const totalIn  = txs.filter(t => t.type === 'in').reduce((s,t) => s + t.amount, 0);
      const totalOut = txs.filter(t => t.type === 'out').reduce((s,t) => s + t.amount, 0);
      const net = totalIn - totalOut;

      const txRows = txs.length === 0
        ? `<p class="text-slate-500 text-sm text-center py-6">Tidak ada transaksi bulan ini.</p>`
        : txs.map(tx => `
            <div class="bg-slate-700/50 rounded-lg p-3 border border-slate-600/40">
              <div class="flex justify-between items-start">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="text-xs font-semibold px-2 py-0.5 rounded bg-slate-600 text-slate-300 capitalize">${tx.category}</span>
                    <span class="text-xs text-slate-500">${tx.date}</span>
                  </div>
                  <p class="text-slate-200 text-sm truncate">${tx.description}</p>
                </div>
                <div class="font-bold text-sm ml-3 whitespace-nowrap ${tx.type === 'in' ? 'text-emerald-400' : 'text-red-400'}">
                  ${tx.type === 'in' ? '+' : '-'}${formatRp(tx.amount)}
                </div>
              </div>
            </div>`).join('');

      document.getElementById('modal-container').innerHTML = `
        <div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="if(event.target===this)openHistoriModal()">
          <div class="bg-slate-800 w-full max-w-sm rounded-2xl border border-slate-700 shadow-2xl modal-enter overflow-hidden">
            <div class="flex justify-between items-center px-5 py-4 border-b border-slate-700">
              <div class="flex items-center gap-2">
                <button onclick="openHistoriModal()" class="text-slate-400 hover:text-orange-400 text-lg leading-none mr-1">←</button>
                <div>
                  <h3 class="text-white font-bold text-base">${label}</h3>
                  <p class="text-slate-400 text-xs mt-0.5">${txs.length} transaksi</p>
                </div>
              </div>
              <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl leading-none">✕</button>
            </div>

            <!-- Ringkasan bulan -->
            <div class="grid grid-cols-3 gap-0 border-b border-slate-700">
              <div class="px-4 py-3 text-center border-r border-slate-700">
                <p class="text-xs text-slate-400 mb-1">Pemasukan</p>
                <p class="text-emerald-400 font-bold text-sm">${formatRp(totalIn)}</p>
              </div>
              <div class="px-4 py-3 text-center border-r border-slate-700">
                <p class="text-xs text-slate-400 mb-1">Pengeluaran</p>
                <p class="text-red-400 font-bold text-sm">${formatRp(totalOut)}</p>
              </div>
              <div class="px-4 py-3 text-center">
                <p class="text-xs text-slate-400 mb-1">Net</p>
                <p class="${net >= 0 ? 'text-emerald-400' : 'text-red-400'} font-bold text-sm">${net >= 0 ? '+' : ''}${formatRp(net)}</p>
              </div>
            </div>

            <!-- List transaksi -->
            <div class="p-4 overflow-y-auto max-h-[55vh] space-y-2">
              ${txRows}
            </div>
          </div>
        </div>`;
      if (window.lucide) lucide.createIcons();
    }

    function closeModal() { document.getElementById('modal-container').innerHTML = ''; editingId = null; }

    // --- 5. RENDER REKAP PRINT OPTIMIZED UNTUK A4 (100% PROPORSIONAL & TIDAK AKAN OVERFLOW/TERPOTONG) ---
    function renderPrintView() {
      let balance = transactions.reduce((acc, t) => t.type === 'in' ? acc + t.amount : acc - t.amount, 0);
      let tIn = transactions.filter(t => t.type === 'in').reduce((sum, t) => sum + t.amount, 0);
      let tOut = transactions.filter(t => t.type === 'out').reduce((sum, t) => sum + t.amount, 0);
      
      const summary = {};
      inventoryTxs.forEach(tx => {
        if (!summary[tx.itemName]) summary[tx.itemName] = 0;
        summary[tx.itemName] += (tx.type === 'in' ? tx.qty : -tx.qty);
      });

      let html = `
        <div style="width: 100%; max-width: 100%; margin: 0 auto; background: #fff; color: #000; box-sizing: border-box;">
          
          <div style="text-align: center; border-bottom: 2pt solid #0f172a; padding-bottom: 12px; margin-bottom: 20px;">
            <h1 style="font-family: 'norwester', sans-serif; font-size: 24pt; margin: 0; color: #0f172a; line-height:1.1;">CUANMABAR</h1>
            <p style="font-size: 10pt; color: #475569; margin: 5px 0 0 0; font-weight: 700; uppercase; tracking-wider">
              LAPORAN KEUANGAN & MUTASI INVENTORI KOMUNITAS — HOSTMABAR.COM
            </p>
          </div>
          
          <table style="width: 100%; table-layout: fixed; border: none !important; margin-bottom: 20px; border-collapse: separate !important; border-spacing: 8px 0; margin-left: 0; margin-right: 0;" class="print-avoid-break">
            <tr>
              <td style="width: 50%; border: 1px solid #cbd5e1 !important; border-radius: 8px !important; padding: 14px; background-color: #f8fafc !important; vertical-align: top;">
                <h4 style="margin: 0 0 6px 0; font-size: 10pt; color: #334155; text-transform: uppercase; font-weight: 800; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px;">Ikhtisar Keuangan</h4>
                <p style="font-size: 8pt; color: #64748b; margin: 4px 0 2px 0;">Total Kas Berjalan</p>
                <div style="font-size: 18pt; font-weight: 800; color: #000; margin-bottom: 6px; letter-spacing: -0.5px;">${formatRp(balance)}</div>
                <div style="font-size: 9pt; color: #334155; line-height: 1.4;">
                  Total Masuk: <span style="font-weight: 700; color: #16a34a;">${formatRp(tIn)}</span><br>
                  Total Keluar: <span style="font-weight: 700; color: #dc2626;">${formatRp(tOut)}</span>
                </div>
              </td>
              <td style="width: 50%; border: 1px solid #cbd5e1 !important; border-radius: 8px !important; padding: 14px; background-color: #f8fafc !important; vertical-align: top;">
                <h4 style="margin: 0 0 6px 0; font-size: 10pt; color: #334155; text-transform: uppercase; font-weight: 800; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px;">Status Aktual Stok</h4>
                <p style="font-size: 8pt; color: #64748b; margin: 4px 0 6px 0;">Sisa inventori digudang</p>
                <div style="font-size: 9pt; color: #1e293b; line-height: 1.5;">
                  ${Object.keys(summary).length === 0 ? '<p style="font-size: 9pt; color: #64748b; margin: 0; font-style: italic;">Stok barang kosong / belum tercatat.</p>' : 
                    Object.entries(summary).map(([item, qty]) => `
                      <div style="font-weight: 700; margin-bottom: 3px;">
                        • ${item} <span style="color: #64748b; font-weight:400;">:</span> <span style="color: #ea580c;">${qty} Unit</span>
                      </div>
                    `).join('')}
                </div>
              </td>
            </tr>
          </table>
          
          <div style="margin-bottom: 22px;" class="print-avoid-break">
            <h3 style="font-size: 11pt; text-transform: uppercase; margin: 0 0 8px 0; border-left: 4px solid #f97316; padding-left: 8px; font-weight: 800; color: #0f172a;">1. Catatan Buku Transaksi Kas</h3>
            <table style="width: 100%; border-collapse: collapse; table-layout: fixed;">
              <thead>
                <tr>
                  <th style="width: 15%; text-align: left;">Tanggal</th>
                  <th style="width: 20%; text-align: left;">Kategori</th>
                  <th style="text-align: left;">Keterangan / Deskripsi</th>
                  <th style="width: 25%; text-align: right;">Nominal</th>
                </tr>
              </thead>
              <tbody>
                ${transactions.length === 0 ? '<tr><td colspan="4" style="text-align: center; padding: 15px; color: #64748b; font-style: italic;">Belum ada rekaman data transaksi kas.</td></tr>' : 
                  transactions.map(t => `
                  <tr>
                    <td style="text-align: left;">${t.date}</td>
                    <td style="text-transform: capitalize; text-align: left;">${t.category}</td>
                    <td style="color: #334155; text-align: left;">${t.description}</td>
                    <td style="text-align: right; font-weight: 700; color: ${t.type==='in'?'#16a34a':'#dc2626'};">
                      ${t.type==='in'?'+':'-'} ${formatRp(t.amount).replace(/\s/g, '')}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          
          <div style="margin-bottom: 22px;" class="print-avoid-break">
            <h3 style="font-size: 11pt; text-transform: uppercase; margin: 0 0 8px 0; border-left: 4px solid #f97316; padding-left: 8px; font-weight: 800; color: #0f172a;">2. Status Monitoring Iuran Member</h3>
            <table style="width: 100%; border-collapse: collapse; table-layout: fixed;">
              <thead>
                <tr>
                  <th style="text-align: left;">Nama Member / Pemain</th>
                  <th style="width: 30%; text-align: center;">Status Tagihan</th>
                  <th style="width: 30%; text-align: right;">Nominal Periode Ini</th>
                </tr>
              </thead>
              <tbody>
                ${members.length === 0 ? '<tr><td colspan="3" style="text-align: center; padding: 15px; color: #64748b; font-style: italic;">Belum ada daftar tagihan iuran member.</td></tr>' : 
                  members.map(m => `
                  <tr>
                    <td style="font-weight: 500; text-align: left;">${m.name}</td>
                    <td style="text-align: center; font-weight: 700; uppercase;">
                      ${m.status === 'lunas' ? '<span style="color: #15803d;">✅ LUNAS</span>' : m.status === 'belum' ? '<span style="color: #1d4ed8;">⏳ BELUM</span>' : '<span style="color: #b91c1c;">❌ NUNGGAK</span>'}
                    </td>
                    <td style="text-align: right; font-weight: 600;">${formatRp(m.dueAmount).replace(/\s/g, '')}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>

          <div style="margin-bottom: 22px;" class="print-avoid-break">
            <h3 style="font-size: 11pt; text-transform: uppercase; margin: 0 0 8px 0; border-left: 4px solid #f97316; padding-left: 8px; font-weight: 800; color: #0f172a;">3. Riwayat Mutasi Log Inventori</h3>
            <table style="width: 100%; border-collapse: collapse; table-layout: fixed;">
              <thead>
                <tr>
                  <th style="width: 15%; text-align: left;">Tanggal</th>
                  <th style="width: 30%; text-align: left;">Nama Barang / Item</th>
                  <th style="text-align: left;">Keterangan Pemakaian / Log</th>
                  <th style="width: 15%; text-align: center;">Jumlah</th>
                </tr>
              </thead>
              <tbody>
                ${inventoryTxs.length === 0 ? '<tr><td colspan="4" style="text-align: center; padding: 15px; color: #64748b; font-style: italic;">Belum ada rekaman riwayat log mutasi barang.</td></tr>' : 
                  inventoryTxs.map(tx => `
                  <tr>
                    <td style="text-align: left;">${tx.date}</td>
                    <td style="font-weight: 500; text-align: left;">${tx.itemName}</td>
                    <td style="color: #475569; text-align: left;">${tx.description}</td>
                    <td style="text-align: center; font-weight: 700; color: ${tx.type==='in'?'#15803d':'#b91c1c'};">
                      ${tx.type==='in'?'+':'-'}${tx.qty}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          
          <div style="margin-top: 35px; text-align: center; font-size: 8pt; color: #64748b; border-t: 1px solid #e2e8f0; padding-top: 8px; font-style: italic;">
            Laporan finansial ini digenerate secara akurat dan sah oleh sistem internal CUANMABAR via hostmabar.com.
          </div>
        </div>
      `;
      document.getElementById('print-section').innerHTML = html;
    }

    // Jalankan inisialisasi aplikasi pertama kali dibuka
    loadCloudData();

  
// ── SESSION GUARD ────────────────────────────────────────────────────────
(function proteksiHalaman() {
  try {
    const raw = localStorage.getItem('hm_session');
    if (!raw) { window.location.replace(''); return; }
    const s = JSON.parse(raw);
    if (!s || !s.loginAt) { window.location.replace(''); return; }
    if (s.expiresAt && Date.now() > s.expiresAt) {
      localStorage.removeItem('hm_session');
      localStorage.removeItem('hm_komunitas');
      window.location.replace('login-cuanmabar.html'); return;
    }
  } catch(e) { window.location.replace('login-cuanmabar.html'); }
})();
</script>
