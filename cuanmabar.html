<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUANMABAR - Financial Community</title>
  
  <script>
    // Sistem proteksi halaman (hanya bisa diakses jika login)
    (function checkSession() {
      const raw = localStorage.getItem('hm_session');
      if (!raw) {
        window.location.replace('Login.html');
        return;
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Mengatur agar UI aplikasi tidak ikut tercetak */
    @media print {
      body { background: #ffffff !important; color: #000000 !important; }
      .no-print { display: none !important; }
      #print-section { display: block !important; width: 100% !important; padding: 20px !important; }
      @page { size: A4 portrait; margin: 20mm; }
      table { width: 100% !important; border-collapse: collapse !important; }
      th, td { border: 1px solid #000 !important; padding: 10px !important; }
    }
  </style>
</head>
<body class="bg-slate-900 text-white">

  <div class="max-w-md mx-auto min-h-screen p-5 no-print">
    <header class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">CUANMABAR</h1>
      <button onclick="handleLogout()" class="text-red-400 font-bold hover:text-red-300">Logout</button>
    </header>
    
    <div id="app-content">
      <p>Dashboard Keuangan...</p>
    </div>
    
    <button onclick="window.print()" class="w-full bg-orange-500 p-3 rounded-lg font-bold mt-5 hover:bg-orange-600">
      Cetak Laporan PDF
    </button>
  </div>

  <div id="print-section" class="hidden text-black">
    <h1 class="text-center text-2xl font-bold mb-5">Laporan Keuangan Komunitas</h1>
    <div id="print-content">
      <p>Contoh data laporan...</p>
    </div>
  </div>

  <script>
    // FUNGSI LOGOUT (Disamakan polanya dengan trialversion.html)
    function handleLogout() {
      localStorage.removeItem('hm_session');
      window.location.replace('Login.html');
    }
  </script>
</body>
</html>
