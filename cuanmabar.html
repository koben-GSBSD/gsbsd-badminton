  <script>
    (function proteksiHalaman() {
      const raw = localStorage.getItem('hm_session');
      if (!raw) {
        window.location.replace('Login.html');
        return;
      }
      const s = JSON.parse(raw);
      if (s && Date.now() > s.expiresAt) {
        localStorage.removeItem('hm_session');
        window.location.replace('Login.html');
      }
    })();
  </script>
