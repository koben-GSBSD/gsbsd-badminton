<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HOSTMABAR — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --orange:#F7941D; --pink:#E8174A;
    --grad:linear-gradient(135deg,#F7941D 0%,#E8174A 100%);
    --bg:#0f0f13; --surface:#2a2a36; --card:#1e1e28;
    --border:#38384a; --text:#f0f0f8; --muted:#9898b0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Nunito",sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  /* Latar Belakang */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background: radial-gradient(ellipse 70% 60% at 20% 20%,rgba(247,148,29,.09) 0%,transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%,rgba(232,23,74,.08) 0%,transparent 60%);
  }
  .login-wrap{ position:relative; z-index:1; width:100%; max-width:400px; }
  .brand-title{ font-family:"Poppins",sans-serif; font-size:32px; font-weight:800; color:#ffffff; text-align:center; margin-bottom:24px; letter-spacing:1px; }
  .login-card{ background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 24px; position:relative; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .login-card::before{ content:""; position:absolute; top:0; left:0; right:0; height:3px; background:var(--grad); }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#c0c0d4; margin-bottom:6px; }
  .input-wrap input{ width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; color:#ffffff; font-family:"Nunito",sans-serif; font-size:14px; outline:none; transition:0.2s; }
  .input-wrap input:focus{ border-color:var(--orange); }
  .btn-login{ width:100%; padding:14px; background:var(--grad); color:#fff; border:none; border-radius:10px; cursor:pointer; font-family:"Poppins",sans-serif; font-size:14px; font-weight:800; letter-spacing:.5px; transition:0.2s; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-login:hover{ filter:brightness(1.1); transform:translateY(-1px); }
  .error-msg{ display:none; background:rgba(232,23,74,.12); border:1.5px solid rgba(232,23,74,.4); border-radius:10px; padding:10px; font-size:13px; font-weight:600; color:#ff7070; margin-bottom:14px; text-align:center; }
  .error-msg.show{ display:block; }
  .success-overlay{ display:none; position:fixed; inset:0; z-index:100; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:12px; }
  .success-overlay.show{ display:flex; }
  .success-text{ font-family:"Poppins",sans-serif; font-size:24px; font-weight:800; color:#fff; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand-title">HOSTMABAR</div>
  
  <div class="login-card">
    <div class="error-msg" id="errorMsg">Username atau Password salah!</div>
    
    <form onsubmit="doLogin(event)">
      <div class="field">
        <label>Username Komunitas</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Masukkan username" required>
        </div>
      </div>
      
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Masukkan password" required>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="loginBtnText">Masuk ke Sistem</span>
      </button>
    </form>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-text">Login Berhasil!</div>
  <div style="color:var(--muted); font-size:14px;">Membuka halaman komunitas...</div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// DAFTAR AKUN & HALAMAN TUJUAN
// ══════════════════════════════════════════════════════════════════
const USERS = {
  'trial' : { pass: 'coba123', url: 'trialversion.html' },
  'gsbsd' : { pass: 'gsbsd2025', url: 'komunitas-gsbsd.html' }
};

function doLogin(e) {
  e.preventDefault();
  const user = document.getElementById('username').value.trim().toLowerCase();
  const pass = document.getElementById('password').value;
  const btn  = document.getElementById('loginBtn');
  const text = document.getElementById('loginBtnText');
  const errorMsg = document.getElementById('errorMsg');

  // Loading state
  btn.disabled = true;
  text.textContent = 'Memeriksa...';
  errorMsg.classList.remove('show');

  setTimeout(() => {
    if (USERS[user] && USERS[user].pass === pass) {
      // Jika SUKSES
      const sessionData = {
        user: user,
        loginAt: Date.now()
      };
      localStorage.setItem('hm_session', JSON.stringify(sessionData));
      
      // Tampilkan layar hitam loading sukses
      document.getElementById('successOverlay').classList.add('show');
      
      // Pindah ke halaman masing-masing
      setTimeout(() => {
        window.location.href = USERS[user].url;
      }, 1000);

    } else {
      // Jika GAGAL
      btn.disabled = false;
      text.textContent = 'Masuk ke Sistem';
      errorMsg.textContent = !USERS[user] ? 'Username tidak ditemukan.' : 'Password salah. Coba lagi.';
      errorMsg.classList.add('show');
      
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }, 600); 
}

// Menghilangkan pesan error saat user mengetik ulang
document.getElementById('username').addEventListener('input', () => {
  document.getElementById('errorMsg').classList.remove('show');
});
document.getElementById('password').addEventListener('input', () => {
  document.getElementById('errorMsg').classList.remove('show');
});

// Auto-login: Mengecek apakah pengunjung belum logout
(function checkSession() {
  try {
    const raw = localStorage.getItem('hm_session');
    if (!raw) return;
    const s = JSON.parse(raw);
    
    if (s && USERS[s.user]) {
      // Jika tiket masih ada dan valid, lewati form login dan arahkan langsung
      document.getElementById('successOverlay').classList.add('show');
      window.location.href = USERS[s.user].url;
    } else {
      // Jika data rusak, hapus tiketnya
      localStorage.removeItem('hm_session');
    }
  } catch(e) {}
})();
</script>

</body>
</html>
