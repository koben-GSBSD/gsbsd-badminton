<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HOSTMABAR — Login</title>
<link href="https://fonts.cdnfonts.com/css/norwester" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --orange:#F7941D; --pink:#E8174A;
    --grad:linear-gradient(135deg,#F7941D 0%,#E8174A 100%);
    --bg:#0f0f13; --surface:#2a2a36; --card:#1e1e28;
    --border:#38384a; --text:#f0f0f8; --muted:#9898b0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Nunito",sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }

  body::before{
    content:""; position:fixed;inset:0;z-index:0;pointer-events:none;
    background: radial-gradient(ellipse 70% 60% at 20% 20%,rgba(247,148,29,.09) 0%,transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%,rgba(232,23,74,.08) 0%,transparent 60%);
  }

  .login-wrap{ position:relative;z-index:1; width:100%;max-width:400px; }

  .brand{ text-align:center; margin-bottom:32px; }
  .brand-logo{
    width:72px;height:72px; border-radius:16px;overflow:hidden;
    margin:0 auto 16px; box-shadow:0 8px 32px rgba(247,148,29,.35); position:relative;
    background: #0F0F13;
  }
  .brand-logo::after{
    content:""; position:absolute;inset:0; border-radius:16px;
    box-shadow:inset 0 0 0 1.5px rgba(247,148,29,.3);
  }
  .brand-title{
    font-family:"Norwester",sans-serif; font-size:36px; font-weight:400;
    color:#ffffff; letter-spacing:3px; line-height:1; margin-bottom:8px;
  }
  .brand-sub{ font-size:12px; color:var(--muted); font-weight:600; letter-spacing:1px; }

  .login-card{
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    padding:28px 24px; box-shadow:0 20px 60px rgba(0,0,0,.5); position:relative; overflow:hidden;
  }
  .login-card::before{ content:""; position:absolute;top:0;left:0;right:0; height:2px; background:var(--grad); }
  
  .login-card-title{ font-family:"Poppins",sans-serif; font-size:16px;font-weight:800; color:#ffffff; margin-bottom:4px; }
  .login-card-sub{ font-size:12px;color:var(--muted); margin-bottom:22px; }

  .field{margin-bottom:16px;}
  .field label{ display:block; font-size:11px;font-weight:700; letter-spacing:1px;text-transform:uppercase; color:#c0c0d4;margin-bottom:6px; }
  .input-wrap{ position:relative; display:flex;align-items:center; }
  .input-wrap input{
    width:100%; background:var(--surface); border:1.5px solid var(--border);
    border-radius:10px; padding:11px 40px 11px 13px; color:#ffffff;
    font-family:"Nunito",sans-serif; font-size:14px; outline:none; transition:0.2s;
  }
  .input-wrap input:focus{ border-color:var(--orange); }
  
  .toggle-pw{
    position:absolute;right:13px; background:none;border:none;cursor:pointer;
    font-size:16px;color:var(--muted); transition:color .15s; padding:2px;
  }
  .toggle-pw:hover{color:var(--orange);}

  .btn-login{
    width:100%; padding:13px; background:var(--grad); color:#fff; border:none;border-radius:10px;
    cursor:pointer; font-family:"Poppins",sans-serif; font-size:14px;font-weight:800;
    margin-top:4px; display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-login .spin{
    display:none;width:16px;height:16px; border:2.5px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%; animation:spin .65s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .error-msg{
    display:none; background:rgba(232,23,74,.12); border:1.5px solid rgba(232,23,74,.4);
    border-radius:10px; padding:10px 14px; font-size:13px;font-weight:600;
    color:#ff7070; margin-bottom:14px; text-align:center;
  }
  .error-msg.show{display:block;}

  .success-overlay{
    display:none; position:fixed;inset:0;z-index:100; background:var(--bg);
    flex-direction:column;align-items:center;justify-content:center;gap:12px;
  }
  .success-overlay.show{display:flex;}
  .success-icon{ font-size:56px; }
  .success-text{ font-family:"Norwester",sans-serif; font-size:28px;letter-spacing:2px;color:#fff; }
  .success-bar{ width:200px;height:3px; background:var(--border);border-radius:10px; margin-top:8px;overflow:hidden; }
  .success-bar-fill{ height:100%;width:0%; background:var(--grad);border-radius:10px; transition:width 1.5s ease; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
        <defs>
          <linearGradient id="hmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F7941D" />
            <stop offset="100%" stop-color="#E8174A" />
          </linearGradient>
        </defs>
        <g stroke="url(#hmGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(0, 15)">
          <line x1="140" y1="120" x2="140" y2="300" />
          <line x1="220" y1="120" x2="220" y2="300" />
          <line x1="140" y1="210" x2="220" y2="130" />
          <line x1="220" y1="130" x2="280" y2="190" />
          <line x1="280" y1="190" x2="360" y2="110" />
          <polyline points="320,110 360,110 360,150" />
        </g>
      </svg>
    </div>
    <div class="brand-title">HOSTMABAR</div>
    <div class="brand-sub">SISTEM MANAJEMEN KOMUNITAS</div>
  </div>

  <div class="login-card">
    <div class="login-card-title">Selamat Datang!</div>
    <div class="login-card-sub">Silakan masuk ke dasbor komunitas Anda.</div>
    
    <div class="error-msg" id="errorMsg">Username atau Password salah!</div>
    
    <form onsubmit="doLogin(event)">
      <div class="field">
        <label>Username Komunitas</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Masukkan username" required>
        </div>
      </div>
      
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Masukkan password" required>
          <button type="button" class="toggle-pw" id="togglePw" onclick="togglePassword()">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spin" id="loginSpin"></div>
        <span id="loginBtnText">Masuk ke Sistem</span>
      </button>
    </form>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-text">Login Berhasil!</div>
  <div style="color:var(--muted);font-size:13px;margin-top:-4px;">Membuka halaman komunitas...</div>
  <div class="success-bar"><div class="success-bar-fill" id="successBarFill"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://pxfpskzwkfpxslsvqbpz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4ZnBza3p3a2ZweHNsc3ZxYnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDIxODUsImV4cCI6MjA5NTYxODE4NX0.KQ8ozsVzZOesp_ickIbdaYmQR9_0TA4xN40MDMjUeFI';

const { createClient } = window.supabase;
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function doLogin(e) {
  e.preventDefault(); 
  
  const user = document.getElementById('username').value.trim().toLowerCase();
  const pass = document.getElementById('password').value;
  const btn  = document.getElementById('loginBtn');
  const spin = document.getElementById('loginSpin');
  const text = document.getElementById('loginBtnText');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  spin.style.display = 'block';
  text.textContent = 'Memeriksa...';
  errorMsg.classList.remove('show');

  try {
    const { data, error } = await supabase
      .from('akun_komunitas')
      .select('*')
      .eq('username', user)
      .eq('password', pass)
      .single();

    if (error) throw error; 

    if (data) {
      localStorage.setItem('hm_session', JSON.stringify({
        user: data.username,
        url: data.redirect_url,
        loginAt: Date.now(),
        expiresAt: Date.now() + (480 * 60 * 1000)
      }));
      
      document.getElementById('successOverlay').classList.add('show');
      setTimeout(() => { document.getElementById('successBarFill').style.width = '100%'; }, 100);
      setTimeout(() => { window.location.href = data.redirect_url; }, 1500);
    }
  } catch (err) {
    btn.disabled = false;
    spin.style.display = 'none';
    text.textContent = 'Masuk ke Sistem';
    errorMsg.textContent = 'Username atau password salah.';
    errorMsg.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
    console.error(err);
  }
}

function togglePassword() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('togglePw');
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁';
}

document.getElementById('username').addEventListener('input', () => { document.getElementById('errorMsg').classList.remove('show'); });
document.getElementById('password').addEventListener('input', () => { document.getElementById('errorMsg').classList.remove('show'); });

(function checkSession() {
  try {
    const raw = localStorage.getItem('hm_session');
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && s.url && Date.now() < s.expiresAt) {
      document.getElementById('successOverlay').classList.add('show');
      setTimeout(() => { document.getElementById('successBarFill').style.width = '100%'; }, 10);
      window.location.href = s.url;
    } else {
      localStorage.removeItem('hm_session');
    }
  } catch(e) {}
})();
</script>
</body>
</html>
